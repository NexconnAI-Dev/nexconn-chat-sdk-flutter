name: ai_nexconn_chat_plugin
description: A Flutter plugin for integrating Nexconn Chat SDK features into your application.
version: 26.2.2
repository: https://github.com/NexconnAI-Dev/nexconn-chat-sdk-flutter

environment:
  sdk: ^3.7.2
  flutter: ">=3.29.2"

# Add regular dependencies here.
dependencies:
  flutter:
    sdk: flutter
  # path: ^1.9.0
  rongcloud_im_wrapper_plugin: ^5.32.6
    # path: plugins/rongcloud_im_wrapper_plugin-5.32.3

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.6

flutter:
  plugin:
    platforms:
      android:
        package: ai.nexconn.chat_plugin
        pluginClass: AiNexconnChatPlugin
